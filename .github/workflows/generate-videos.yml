name: Generate Videos

on:
  #schedule:
  #  - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run: 
        shell: bash
        working-directory: /opt
    container:
      options: --user 0
      image: ghcr.io/malaclyde/psychedelic-video:latest
      # GitHub actions automatically passes GITHUB_TOKEN for organization level access if it's GitHub packages
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PACKAGES_TOKEN }}
        
    steps:
      - name: Manual Checkout into /opt
        working-directory: /opt  
        run: |
          git clone --branch ${{ github.ref_name }} "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" clone_dir
          cp -a clone_dir/. .
          rm -rf clone_dir

      - name: Cache models and Kokoro tmp
        uses: actions/cache@v4
        id: cache-models
        with:
          path: |
            /opt/models
            /opt/.tmp-kokoro
          # The key changes each run so new cache is saved, but it restores from the latest previous run
          key: generated-video-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            generated-video-cache-${{ runner.os }}-

      - name: Setup opencode auth
        working-directory: /opt
        run: |
          mkdir -p /root/.local/share/opencode
          echo '{
            "zai-coding-plan": {
              "type": "api",
              "key": "${{ secrets.ZAI_TOKEN }}"
            }
          }' > /root/.local/share/opencode/auth.json
          opencode models

      - name: Generate Videos with opencode
        working-directory: /opt
        run: |
          opencode models
          python .github/scripts/generate_videos.py

      - name: Commit updated summary
        working-directory: /opt
        run: |
          git config --global --add safe.directory /opt
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _pages/
          git diff --staged --quiet || (git commit -m "updated summary" && git push)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: generate_artifacts/
          retention-days: 14
